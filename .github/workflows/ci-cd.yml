name: CI/CD

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyflakes PyQt5
          sudo apt-get update
          sudo apt-get install -y sqlite3 xvfb
      
      - name: Check Python syntax
        run: pyflakes *.py || true
      
      - name: Check Bash syntax
        run: bash -n very_easy_gui.sh
      
      - name: Check database
        run: |
          if [ -f "guitar-led-trainer.db" ]; then
            sqlite3 guitar-led-trainer.db "PRAGMA integrity_check;"
            echo "✅ DB OK"
          else
            echo "⚠️ No DB file"
          fi
      
      - name: Test PyQt
        run: |
          export QT_QPA_PLATFORM=offscreen
          python -c "from PyQt5.QtWidgets import QApplication; import sys; app = QApplication(sys.argv); print('✅ PyQt works')"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guitar-led-trainer
          path: |
            *.py
            *.sh
            *.db
            README.md
