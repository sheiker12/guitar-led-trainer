name: CI/CD

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: |
          pip install pyflakes
          sudo apt-get install -y sqlite3
      
      - name: Check Python
        run: pyflakes *.py || true
      
      - name: Check Bash
        run: bash -n very_easy_gui.sh
      
      - name: Check DB
        run: |
          if [ -f "guitar-led-trainer.db" ]; then
            sqlite3 guitar-led-trainer.db "PRAGMA integrity_check;"
            echo "✅ DB OK"
          else
            echo "⚠️ No DB - will be created on first run"
          fi
      
      - name: Test PyQt
        run: |
          export QT_QPA_PLATFORM=offscreen
          python -c "from PyQt5.QtWidgets import QApplication; import sys; app = QApplication(sys.argv); print('✅ PyQt OK')"
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: guitar-led-trainer
          path: |
            *.py
            *.sh
            *.db
            README.md
